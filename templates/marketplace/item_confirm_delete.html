{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-danger">
            <div class="card-body py-5">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                <h3 class="mt-3">Delete Item?</h3>
                <p class="text-muted">Are you sure you want to delete the item <strong>"{{ item.title }}"</strong>? This action cannot be undone.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'item_detail' item.pk %}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, Delete Item</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
