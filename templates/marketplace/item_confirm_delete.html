{% extends 'base.html' %}

{% block title %}İlanı Sil — Campus Exchange{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm border-danger mt-4">
      <div class="card-body py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size:4rem;"></i>
        <h3 class="mt-3">İlanı Sil?</h3>
        <p class="text-muted">
          <strong>"{{ item.title }}"</strong> ilanını silmek istediğinden emin misin?
          Bu işlem geri alınamaz.
        </p>
        <form method="post" class="mt-4">
          {% csrf_token %}
          <a href="{% url 'item_detail' item.pk %}" class="btn btn-secondary me-2">
            <i class="bi bi-arrow-left me-1"></i>Vazgeç
          </a>
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Evet, Sil
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
