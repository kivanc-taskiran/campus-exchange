{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Giriş Yap — Campus Exchange{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow mt-5">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-box-seam text-primary" style="font-size:2.5rem;"></i>
          <h3 class="fw-bold mt-2">Tekrar Hoş Geldin</h3>
          <p class="text-muted small">Campus Exchange'e giriş yap</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary w-100 mt-3 py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
          </button>
        </form>
        <div class="text-center mt-3">
          <p class="text-muted">Hesabın yok mu? <a href="{% url 'register' %}">Kayıt ol</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
