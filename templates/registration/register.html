{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Kayıt Ol — Campus Exchange{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow mt-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill text-success" style="font-size:2.5rem;"></i>
          <h3 class="fw-bold mt-2">Hesap Oluştur</h3>
          <p class="text-muted small">Kampüs topluluğuna katıl, al ve sat!</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-success w-100 mt-3 py-2">
            <i class="bi bi-person-check me-2"></i>Kayıt Ol
          </button>
        </form>
        <div class="text-center mt-3">
          <p class="text-muted">Zaten hesabın var mı? <a href="{% url 'login' %}">Giriş yap</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
